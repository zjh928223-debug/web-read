<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Seek Player + Smart Chunking (Pro)</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  
  <div id="theme-controls">
    <button id="theme-toggle" title="切换浅色/深色/自定义模式">☀</button>
    <div id="theme-custom-panel" hidden>
      <div class="theme-custom-row">
        <label for="theme-custom-bg">背景</label>
        <input type="color" id="theme-custom-bg" value="#eef2f7">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-text">主字</label>
        <input type="color" id="theme-custom-text" value="#1c1e21">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-sub">辅字</label>
        <input type="color" id="theme-custom-sub" value="#4b5563">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-border">边框</label>
        <input type="color" id="theme-custom-border" value="#cbd5e1">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-button">按钮</label>
        <input type="color" id="theme-custom-button" value="#dbeafe">
      </div>
      <button type="button" id="theme-custom-reset" class="small-btn">重置配色</button>
    </div>
  </div>
  <svg id="chunk-note-svg-layer" aria-hidden="true"></svg>
  <div id="chunk-note-probe" class="chunk-note-probe"></div>
  <div id="chunk-note-ctx-menu">
    <button type="button" id="chunk-note-ctx-add" class="chunk-note-ctx-item">添加备注</button>
  </div>

  <div id="main-app-area">
    <div class="container">
      <div class="controls">
        <label>音频:</label>
        <label for="audio-file" class="file-btn" id="lbl-audio">选择音频</label>
        <input type="file" id="audio-file" accept="audio/*">
        
        <label>字幕:</label>
        <label for="transcript-file" class="file-btn" id="lbl-transcript">选择字幕</label>
        <input type="file" id="transcript-file" accept=".json">
      </div>

      <audio id="audio-player" controls></audio>

      <div class="extra-controls">
        <div class="control-group seek-controls">
          <button onclick="handleBackwardClick()">上一句</button>
          <input id="hotkey-backward-input" class="hotkey-input-wide" type="text" value="ArrowLeft" title="设置后退快捷键" />
          <button onclick="handleForwardClick()">下一句</button>
          <input id="hotkey-forward-input" class="hotkey-input-wide" type="text" value="ArrowRight" title="设置前进快捷键" />
        </div>
        <div class="control-group speed-controls">
          <button class="speed-btn" data-speed="0.85" onclick="changeSpeed(0.85)">0.85x</button>
          <button class="speed-btn speed-button-active" data-speed="1.0" onclick="changeSpeed(1.0)">1.0x</button>
          <button class="speed-btn" data-speed="1.25" onclick="changeSpeed(1.25)">1.25x</button>
        </div>
      </div>

      <div class="transcript-header">
        <div class="transcript-actions">
          <button id="toggle-follow" class="on">跟随:开</button>
          
          <span class="hotkey-box">
            释义 <input id="hotkey-notes-input" class="hotkey-input" type="text" maxlength="1" value="n" />
          </span>

          <span class="hotkey-box">
            标记 <input id="hotkey-input" class="hotkey-input" type="text" maxlength="1" value="m" />
          </span>

          <span class="hotkey-box" title="开关独立标注释义泡泡">
            泡 <input id="hotkey-annotation-bubble-input" class="hotkey-input" type="text" maxlength="1" value="b" />
          </span>
          
          <button id="highlight-mode-btn" onclick="cycleHighlightMode()">高亮:词</button>
          
          <span class="hotkey-box" title="句子高亮底色">
            句<input type="color" id="sentence-color-input" class="color-input" value="#e5e7eb">
          </span>
          <span class="hotkey-box" title="单词高亮底色">
            词<input type="color" id="highlight-color-input" class="color-input" value="#ffeb3b">
          </span>

          <input type="file" id="import-marks-file" accept=".json" style="display: none;" />
          <button id="import-marks-btn" class="small-btn">导标记</button>
          <button id="export-json" class="small-btn">存JSON</button>
          <button id="export-md-all" class="small-btn">存TXT</button>
          <button id="btn-annotation-generate" class="small-btn" type="button">查看Prompt</button>
          <button id="btn-export-annotation-lightweight" class="small-btn" type="button" title="导出轻量回填模板，适合补 boundary/type/meaning/memoryHint">导出轻回填模板</button>
          <input type="file" id="import-annotation-lightweight-file" accept=".json" style="display: none;" />
          <button id="btn-import-annotation-lightweight" class="small-btn" type="button" title="导入轻量回填结果，适合日常补释义">导入轻回填结果</button>
          <input type="file" id="import-annotation-generated-file" accept=".json" style="display: none;" />
          <button id="btn-import-annotation-generated" class="small-btn" type="button" title="导入完整全文注释包，适合整包恢复或替换">导入完整注释包</button>
          <button id="btn-annotation-api-settings" class="small-btn" type="button" aria-haspopup="dialog" aria-expanded="false" hidden>API设置</button>
          <span id="annotation-generation-status" class="annotation-generation-status" role="status" aria-live="polite">
            <span class="annotation-generation-status__label">待命</span>
            <span class="annotation-generation-status__message">Prompt/导入入口加载中</span>
          </span>
          <div id="annotation-api-settings-panel" class="annotation-api-settings-panel" role="dialog" aria-label="Annotation API Settings" hidden></div>
          <div id="annotation-prompt-panel" class="annotation-prompt-panel" role="dialog" aria-label="Annotation Prompt" hidden>
            <div class="annotation-prompt-panel__header">
              <strong>全文注释 Prompt</strong>
              <div class="annotation-prompt-panel__actions">
                <button id="btn-annotation-prompt-copy" class="small-btn" type="button">复制Prompt</button>
                <button id="btn-annotation-prompt-export" class="small-btn" type="button">导出JSON</button>
                <button id="btn-annotation-prompt-close" class="small-btn" type="button">关闭</button>
              </div>
            </div>
            <div id="annotation-prompt-summary" class="annotation-prompt-panel__summary"></div>
            <textarea id="annotation-prompt-text" class="annotation-prompt-panel__textarea" spellcheck="false" readonly></textarea>
          </div>

          <input type="file" id="chunk-file" accept=".json" style="display: none;">
          <input type="file" id="cloze-file" accept=".json" style="display: none;">
          <button id="toggle-chunk-btn" onclick="toggleChunkMode()">AI切分</button>
          <button id="btn-load-chunk" class="small-btn" onclick="document.getElementById('chunk-file').click()">导切分</button>
          <button id="btn-load-cloze" class="small-btn" onclick="document.getElementById('cloze-file').click()">导填空</button>
          <button id="btn-chunk-style" title="调整切分模式样式" style="font-family:serif; font-weight:bold; padding: 3px 8px; margin-right: 2px;" onclick="openChunkStyleModal()">T</button>
          
          <span class="hotkey-box">
            中<input id="hotkey-chunk-cn-input" class="hotkey-input" type="text" maxlength="1" value="c" title="AI切分模式下开关中文" />
            <button id="btn-chunk-cn-hold" class="mini-toggle" title="切换：按住快捷键才显示中文">持续</button>
          </span>

          <button id="btn-chunk-focus" class="small-btn" onclick="toggleChunkFocusMode()" title="切换中文显示模式：全局/聚焦" style="padding: 3px 10px; min-width:30px;">全局</button>
          
          <span class="hotkey-box" title="AI切分模式下开关高亮背景（阴影）">
            影<input id="hotkey-chunk-shadow-input" class="hotkey-input" type="text" maxlength="1" value="s" />
          </span>

          <span class="hotkey-box" title="AI切分模式下开关右侧备注">
            注<input id="hotkey-chunk-note-input" class="hotkey-input" type="text" maxlength="1" value="x" />
          </span>
          <input type="file" id="import-chunk-notes-file" accept=".json" style="display:none;">
          <button id="btn-import-chunk-notes" class="small-btn" title="导入备注 JSON">导注</button>
          <button id="btn-export-chunk-notes" class="small-btn" title="导出备注 JSON">存注</button>
          <button id="btn-chunk-note-style" title="调整备注样式" style="font-family:serif; font-weight:bold; padding: 3px 8px; margin-right: 2px;" onclick="openChunkNoteStyleModal()">N</button>
        </div>
      </div>

      <div class="reading-shell">
        <div id="transcript-container">请按顺序加载文件...</div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop"></div>

  <div id="chunk-style-modal">
      <div class="modal-header">
          <span class="modal-title">AI切分模式样式</span>
          <span class="close-modal" onclick="closeChunkStyleModal()">脳</span>
      </div>
      
      <div class="style-section">
          <h4>字体大小</h4>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px;">英文</span>
              <input type="number" id="chunk-en-size-input" class="style-input-num" value="20" oninput="updateChunkStyle()"> px
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px;">中文</span>
              <input type="number" id="chunk-cn-size-input" class="style-input-num" value="16" oninput="updateChunkStyle()"> px
          </div>
      </div>

      <div class="style-section">
          <h4>布局与颜色</h4>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">块间距</span>
              <input type="number" id="chunk-gap-input" class="style-input-num" value="20" step="1" oninput="updateChunkStyle()"> px
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">中文字色</span>
              <input type="color" id="chunk-cn-color-input" class="color-input" value="#4b5563" oninput="updateChunkStyle()">
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">高亮背景</span>
              <input type="color" id="chunk-bg-color-input" class="color-input" value="#e5e7eb" oninput="updateChunkStyle()">
              <button class="style-btn-toggle" id="btn-toggle-shadow-manual" onclick="toggleChunkShadowManual()" style="margin-left:5px; font-size:10px;">开关 S</button>
          </div>
      </div>
  </div>

  <div id="chunk-note-style-modal">
      <div class="modal-header">
          <span class="modal-title">备注样式</span>
          <span class="close-modal" onclick="closeChunkNoteStyleModal()">脳</span>
      </div>
      <div class="style-section">
          <h4>备注样式</h4>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">字号</span>
              <input type="number" id="chunk-note-size-input" class="style-input-num" value="14" min="10" max="36" step="1" oninput="updateChunkNoteStyle()"> px
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">颜色</span>
              <input type="color" id="chunk-note-color-input" class="color-input" value="#4b5563" oninput="updateChunkNoteStyle()">
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">宽度</span>
              <input type="number" id="chunk-note-width-input" class="style-input-num" value="260" min="140" max="1200" step="10" oninput="updateChunkNoteStyle()"> px
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">高度</span>
              <input type="number" id="chunk-note-min-height-input" class="style-input-num" value="18" min="18" max="360" step="2" oninput="updateChunkNoteStyle()"> px
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">箭头</span>
              <input type="number" id="chunk-note-arrow-size-input" class="style-input-num" value="12" min="6" max="28" step="1" oninput="updateChunkNoteStyle()"> px
          </div>
      </div>
  </div>

  <script async src="https://cse.google.com/cse.js?cx=048d09e2e2f764b7b"></script>

  <script src="data-utils.js"></script>
  <script src="identity-and-storage-keys.js"></script>
  <script src="import-export-shared-helpers.js"></script>
  <script src="sentence-notes-persistence-utils.js"></script>
  <script src="cloze-utils.js"></script>
  <script src="cloze-view-model-helpers.js"></script>
  <script src="playback-index-helpers.js"></script>
  <script src="chunk-matching-helpers.js"></script>
  <script src="chunk-note-layout-helpers.js"></script>
  <script src="chunk-note-layout-core.js"></script>
  <script src="annotation-bubble.js"></script>
  <script src="annotation-api-settings-ui.js"></script>
  <script src="annotation-generation-entry-ui.js"></script>
  <script src="src/stores/theme.js"></script>
  <script src="src/stores/ui.js"></script>
  <script src="src/stores/audio.js"></script>
  <script src="src/stores/marks.js"></script>
  <script src="src/stores/cloze.js"></script>
  <script src="src/stores/transcript.js"></script>
  <script src="src/stores/chunk.js"></script>
  <script src="src/stores/notes.js"></script>
  <script src="src/stores/annotation.js"></script>
  <script src="src/composables/glass-effects.js"></script>
  <script src="src/composables/chunk-note-layout.js"></script>
  <script src="src/composables/app-handlers.js"></script>
  <script src="src/composables/style-editor.js"></script>
  <script src="src/composables/notes-module.js"></script>
  <script src="src/composables/import-module.js"></script>
  <script src="src/composables/keyboard-module.js"></script>
  <script src="src/composables/playback-module.js"></script>
  <script src="src/composables/controls-module.js"></script>
  <script src="app.js"></script>
  <script src="src/composables/session-init.js"></script>

  <!-- Vue mount point + entry (module script runs after all regular scripts) -->
  <div id="vue-root"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
