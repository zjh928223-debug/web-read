<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Seek Player + Smart Chunking (Pro)</title>
  <link rel="stylesheet" href="./styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Noto+Serif+SC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  
  <div id="theme-controls">
    <button id="theme-toggle" title="切换浅色/深色/自定义模式">☀</button>
    <div id="theme-custom-panel" hidden>
      <div class="theme-custom-row">
        <label for="theme-custom-bg">背景</label>
        <input type="color" id="theme-custom-bg" value="#eef2f7">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-text">主字</label>
        <input type="color" id="theme-custom-text" value="#1c1e21">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-sub">辅字</label>
        <input type="color" id="theme-custom-sub" value="#4b5563">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-border">边框</label>
        <input type="color" id="theme-custom-border" value="#cbd5e1">
      </div>
      <div class="theme-custom-row">
        <label for="theme-custom-button">按钮</label>
        <input type="color" id="theme-custom-button" value="#dbeafe">
      </div>
      <button type="button" id="theme-custom-reset" class="small-btn">重置配色</button>
    </div>
  </div>
  <div id="main-app-area">
    <div class="container">
      <div class="controls">
        <details class="deprecated-file-entry">
          <summary>过时入口</summary>
          <div class="deprecated-file-entry-actions">
            <label>音频:</label>
            <label for="audio-file" class="file-btn" id="lbl-audio">选择音频</label>
            <input type="file" id="audio-file" accept="audio/*">

            <label>字幕:</label>
            <label for="transcript-file" class="file-btn" id="lbl-transcript">选择字幕</label>
            <input type="file" id="transcript-file" accept=".json">
          </div>
        </details>
      </div>

      <audio id="audio-player" controls></audio>

      <div class="extra-controls">
        <div class="control-group seek-controls">
          <button id="btn-prev-sentence">上一句</button>
          <input id="hotkey-backward-input" class="hotkey-input-wide" type="text" value="ArrowLeft" title="设置后退快捷键" />
          <button id="btn-next-sentence">下一句</button>
          <input id="hotkey-forward-input" class="hotkey-input-wide" type="text" value="ArrowRight" title="设置前进快捷键" />
        </div>
        <div class="control-group speed-controls">
          <button class="speed-btn" data-speed="0.85">0.85x</button>
          <button class="speed-btn speed-button-active" data-speed="1.0">1.0x</button>
          <button class="speed-btn" data-speed="1.25">1.25x</button>
        </div>
      </div>

      <div class="transcript-header">
        <div class="transcript-actions">
          <button id="toggle-follow" class="on">跟随:开</button>
          
          <span class="hotkey-box">
            标记 <input id="hotkey-input" class="hotkey-input" type="text" maxlength="1" value="m" />
          </span>

          <span class="hotkey-box" title="开关独立标注释义泡泡">
            泡 <input id="hotkey-annotation-bubble-input" class="hotkey-input" type="text" maxlength="1" value="b" />
          </span>
          
          <button id="highlight-mode-btn">高亮:句</button>
          
          <span class="hotkey-box" title="句子高亮底色">
            句<input type="color" id="sentence-color-input" class="color-input" value="#e5e7eb">
          </span>
          <span class="hotkey-box" title="单词高亮底色">
            词<input type="color" id="highlight-color-input" class="color-input" value="#ffeb3b">
          </span>

          <input type="file" id="import-marks-file" accept=".json" style="display: none;" />
          <button id="import-marks-btn" class="small-btn">导标记</button>
          <button id="export-json" class="small-btn">存JSON</button>
          <span id="annotation-mark-count" class="small-btn mark-count-badge" role="status" aria-live="polite" data-count="0" title="当前文章已标记 0 个重点词">已标记 0</span>
          <button id="export-md-all" class="small-btn">存TXT</button>
          <button id="btn-export-annotation-lightweight" class="small-btn" type="button" title="导出轻量回填模板，适合补 boundary/type/meaning/memoryHint">导出轻回填模板</button>
          <input type="file" id="import-annotation-lightweight-file" accept=".json" style="display: none;" />
          <button id="btn-import-annotation-lightweight" class="small-btn" type="button" title="导入轻量回填结果，适合日常补释义">导入轻回填结果</button>

          <button id="toggle-chunk-btn">AI切分</button>
          <button id="btn-chunk-style" title="调整切分模式样式" style="font-family:serif; font-weight:bold; padding: 3px 8px; margin-right: 2px;">T</button>
          
          <span class="hotkey-box">
            中<input id="hotkey-chunk-cn-input" class="hotkey-input" type="text" maxlength="1" value="c" title="AI切分模式下开关中文" />
            <button id="btn-chunk-cn-hold" class="mini-toggle active" title="切换：按住快捷键才显示中文">按住</button>
          </span>

          <button id="btn-chunk-focus" class="small-btn active" title="切换中文显示模式：全局/聚焦" style="padding: 3px 10px; min-width:30px;">聚焦</button>
          
          <span class="hotkey-box" title="AI切分模式下开关高亮背景（阴影）">
            影<input id="hotkey-chunk-shadow-input" class="hotkey-input" type="text" maxlength="1" value="s" />
          </span>

        </div>
      </div>

      <div class="reading-shell">
        <div id="transcript-container">请按顺序加载文件...</div>
        <div id="vue-root"></div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop"></div>

  <div id="chunk-style-modal">
      <div class="modal-header">
          <span class="modal-title">AI切分模式样式</span>
          <span id="btn-close-chunk-style-modal" class="close-modal">&times;</span>
      </div>
      
      <div class="style-section">
          <h4>字体大小</h4>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px;">英文</span>
              <input type="number" id="chunk-en-size-input" class="style-input-num" value="20"> px
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px;">中文</span>
              <input type="number" id="chunk-cn-size-input" class="style-input-num" value="16"> px
          </div>
      </div>

      <div class="style-section">
          <h4>布局与颜色</h4>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">块间距</span>
              <input type="number" id="chunk-gap-input" class="style-input-num" value="20" step="1"> px
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">中文字色</span>
              <input type="color" id="chunk-cn-color-input" class="color-input" value="#4b5563">
          </div>
          <div class="control-row">
              <span style="font-size:12px; margin-right:4px; width:50px;">高亮背景</span>
              <input type="color" id="chunk-bg-color-input" class="color-input" value="#e5e7eb">
              <button class="style-btn-toggle" id="btn-toggle-shadow-manual" style="margin-left:5px; font-size:10px;">开关 S</button>
          </div>
      </div>
  </div>

  <script async src="https://cse.google.com/cse.js?cx=048d09e2e2f764b7b"></script>

  <script type="module" src="src/stores/theme.js"></script>
  <script type="module" src="src/stores/ui.js"></script>
  <script type="module" src="src/stores/audio.js"></script>
  <script type="module" src="src/stores/marks.js"></script>
  <script type="module" src="src/stores/transcript.js"></script>
  <script type="module" src="src/stores/chunk.js"></script>
  <script type="module" src="src/stores/notes.js"></script>
  <script type="module" src="src/stores/annotation.js"></script>
  <script type="module" src="src/composables/glass-effects.js"></script>
  <script type="module" src="src/composables/app-handlers.js"></script>
  <script type="module" src="src/composables/style-editor.js"></script>
  <script type="module" src="src/composables/import-module.js"></script>
  <script type="module" src="src/composables/keyboard-module.js"></script>
  <script type="module" src="src/composables/playback-module.js"></script>
  <script type="module" src="src/composables/controls-module.js"></script>
  <script type="module" src="src/composables/legacy-control-bindings.js"></script>
  <script type="module" src="src/composables/reader-runtime.js"></script>
  <script type="module" src="src/composables/session-init.js"></script>

  <!-- Vue entry (module script runs after all regular scripts) -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
